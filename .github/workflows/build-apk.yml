name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'

      - name: Scaffold android project
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp -r lib /tmp/lib_backup
          rm -rf android
          flutter create --platforms=android --project-name groo --org com.groo .
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec.yaml pubspec.yaml
          rm -rf test

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: groo-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
