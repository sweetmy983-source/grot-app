name: groo
description: "반려식물 관리 앱 (그루우 대체) — 서버 없이 100% 온디바이스 동작"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 로컬 DB
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # 상태관리
  provider: ^6.1.2

  # 알림 (모듈2)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # 사진 (모듈4)
  image_picker: ^1.1.2
  image: ^4.2.0

  # 캘린더 (모듈5)
  table_calendar: ^3.1.2

  # 백업 (모듈6)
  archive: ^3.6.1
  file_picker: ^8.1.2
  share_plus: ^10.0.2

  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
