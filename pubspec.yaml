name: groo
description: "반려식물 관리 앱 (그루우 대체) — 서버 없이 100% 온디바이스 동작"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# 단계별 개발. 현재 모듈1(화분) + 모듈2(물주기/알림) 까지 필요한 패키지.
# 이후: 모듈4 사진(image_picker,image) / 모듈5 캘린더(table_calendar) /
#       모듈6 백업(archive,file_picker,share_plus)
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 로컬 DB
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # 상태관리
  provider: ^6.1.2

  # 알림 (모듈2)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
